<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Food Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:25px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

header h1{
font-size:30px;
}

.cart-btn{
background:#ff5722;
padding:12px 20px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

.hero{
height:350px;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:40px;
font-weight:bold;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:18px;
}

.card h3{
margin-bottom:8px;
}

.price{
color:#ff5722;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#ff5722;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#e64a19;
}

.cart{
position:fixed;
top:0;
right:-450px;
width:420px;
height:100%;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,.2);
transition:.4s;
overflow:auto;
padding:20px;
z-index:999;
}

.cart.active{
right:0;
}

.cart h2{
margin-bottom:20px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:15px 0;
border-bottom:1px solid #ddd;
padding-bottom:10px;
}

.qty button{
width:30px;
height:30px;
padding:0;
margin:2px;
}

.total{
font-size:22px;
font-weight:bold;
margin:20px 0;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

.checkout{
background:#25D366;
margin-top:15px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}

</style>

</head>
<body>

<header>

<h1>🍴 Royal Food</h1>

<div class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
</div>

</header>

<div class="hero">
Delicious Food Delivered Fast
</div>

<div class="menu" id="menu"></div>

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<div class="total">
Total ₹<span id="total">0</span>
</div>

<h3>Customer Details</h3>

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Delivery Address"></textarea>

<button class="checkout" onclick="checkout()">
Checkout on WhatsApp
</button>

</div>

<footer>

Royal Food Restaurant © 2026

</footer>

<script>

const foods=[

["Chicken Biryani",230,"https://source.unsplash.com/400x300/?biryani"],
["Mutton Biryani",300,"https://source.unsplash.com/400x300/?mutton-biryani"],
["Chicken Pizza",320,"https://source.unsplash.com/400x300/?pizza"],
["Veg Pizza",220,"https://source.unsplash.com/400x300/?veg-pizza"],
["French Fries",80,"https://source.unsplash.com/400x300/?fries"],
["Chicken Shawarma",150,"https://source.unsplash.com/400x300/?shawarma"],
["Chicken Burger",200,"https://source.unsplash.com/400x300/?burger"],
["Grilled Chicken",420,"https://source.unsplash.com/400x300/?grilled-chicken"],
["Chicken Wings",240,"https://source.unsplash.com/400x300/?chicken-wings"],
["Chicken Nuggets",130,"https://source.unsplash.com/400x300/?nuggets"],
["Chicken Pasta",280,"https://source.unsplash.com/400x300/?pasta"],
["Fried Chicken",200,"https://source.unsplash.com/400x300/?fried-chicken"],
["Paneer Pizza",340,"https://source.unsplash.com/400x300/?paneer-pizza"],
["Cold Drink",60,"https://source.unsplash.com/400x300/?soft-drink"],
["Chocolate Shake",140,"https://source.unsplash.com/400x300/?milkshake"]

];

const menu=document.getElementById("menu");

foods.forEach((f,i)=>{

menu.innerHTML+=`

<div class="card">

<img src="${f[2]}">

<div class="card-body">

<h3>${f[0]}</h3>

<div class="price">₹${f[1]}</div>

<button onclick="add(${i})">

Add to Cart

</button>

</div>

</div>

`;

});

let cart=[];

function add(i){

let item=cart.find(x=>x.id==i);

if(item){

item.qty++;

}else{

cart.push({id:i,name:foods[i][0],price:foods[i][1],qty:1});

}

update();

}

function update(){

let html="";

let total=0;

cart.forEach((c,index)=>{

total+=c.price*c.qty;

html+=`

<div class="cart-item">

<div>

<b>${c.name}</b><br>

₹${c.price}

</div>

<div class="qty">

<button onclick="minus(${index})">-</button>

${c.qty}

<button onclick="plus(${index})">+</button>

</div>

</div>

`;

});

document.getElementById("cartItems").innerHTML=html;

document.getElementById("total").innerHTML=total;

document.getElementById("count").innerHTML=cart.reduce((a,b)=>a+b.qty,0);

}

function plus(i){

cart[i].qty++;

update();

}

function minus(i){

cart[i].qty--;

if(cart[i].qty<=0){

cart.splice(i,1);

}

update();

}

function toggleCart(){

document.getElementById("cart").classList.toggle("active");

}

function checkout(){

let name=document.getElementById("name").value;

let phone=document.getElementById("phone").value;

let address=document.getElementById("address").value;

if(cart.length==0){

alert("Cart Empty");

return;

}

let msg="🍽️ ROYAL FOOD ORDER%0A%0A";

msg+="Name: "+name+"%0A";

msg+="Phone: "+phone+"%0A";

msg+="Address: "+address+"%0A%0A";

let total=0;

cart.forEach(c=>{

msg+=c.name+" x"+c.qty+" = ₹"+(c.price*c.qty)+"%0A";

total+=c.price*c.qty;

});

msg+="%0ATotal = ₹"+total;

window.open("https://wa.me/919121983328?text="+msg);

}

</script>

</body>
</html>
